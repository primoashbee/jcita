name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Nuxt & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Build Nuxt ─────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Build Nuxt
        working-directory: frontend
        run: bun run build

      # ─── Copy build to EC2 ──────────────────────────────────────
      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "frontend/.output"
          target: "/var/www/jcita/frontend"
          strip_components: 1

      # ─── Deploy Laravel + Restart ───────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  📦 Pulling latest code..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd /var/www/jcita
            git pull origin main

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🔧 Installing PHP dependencies..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            composer install --optimize-autoloader --no-dev --no-interaction

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ⚙️  Running Laravel setup..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link --force 2>/dev/null || true

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🔁 Restarting Nuxt (PM2)..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            export PATH="$PATH:/home/ubuntu/.bun/bin"
            /home/ubuntu/.bun/bin/pm2 restart nuxt-jcita || /home/ubuntu/.bun/bin/pm2 start /var/www/jcita/frontend/.output/server/index.mjs --name "nuxt-jcita"
            /home/ubuntu/.bun/bin/pm2 save

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🔄 Reloading Nginx..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo systemctl reload nginx || sudo systemctl start nginx

            echo ""
            echo "✅ Deployment complete!"